<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Details coming soon | Cyfer Tech</title>
    <meta name="description" content="Details are coming soon on Cyfer Tech." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="index.html">
          <img src="assets/cyfer-logo.svg" alt="Cyfer Tech home" />
          <span>Cyfer Tech</span>
        </a>
        <button
          class="menu-toggle"
          type="button"
          aria-label="Open navigation"
          aria-expanded="false"
        >
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M4 7h16M4 12h16M4 17h16"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <div class="nav-links">
          <a href="index.html">Portfolio</a>
          <a href="products.html">Products</a>
          <a href="blogs.html">Blogs</a>
          <!-- <a href="donation.html">Donation</a> -->
          <a href="contact.html">Contact</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="coming-soon" aria-labelledby="coming-soon-title">
        <h1 id="coming-soon-title">Details</h1>
        <p>
          <span id="coming-soon-type">details</span>
          <span>coming soon..</span>
        </p>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <a class="footer-brand" href="index.html">
          <img src="assets/cyfer-logo.svg" alt="" />
          <span>Cyfer Tech</span>
        </a>
        <p class="footer-copy">&copy; 2026 All rights reserved.</p>
        <nav class="footer-products" aria-label="Product links">
          <a href="coming-soon.html?title=Maya%20UI%20Framework">Maya</a>
          <a href="coming-soon.html?title=Habits">Habits</a>
          <a href="coming-soon.html?title=Batua">Batua</a>
          <a href="coming-soon.html?title=Signal">Signal</a>
          <a href="coming-soon.html?title=KVDB">KVDB</a>
          <a href="coming-soon.html?title=ghcopy">ghcopy</a>
        </nav>
        <nav class="footer-presence" aria-label="Public presence links">
          <a
            class="footer-presence-link"
            href="https://github.com/cyftec"
            target="_blank"
            rel="noreferrer"
            aria-label="GitHub"
            ><img src="assets/icon-github.svg" alt=""
          /></a>
          <a
            class="footer-presence-link"
            href="https://www.npmjs.com/org/cyfertech"
            target="_blank"
            rel="noreferrer"
            aria-label="npm"
            ><img src="assets/icon-npm.svg" alt=""
          /></a>
          <a
            class="footer-presence-link"
            href="https://x.com/cyftec"
            target="_blank"
            rel="noreferrer"
            aria-label="X.com"
            ><img src="assets/icon-x.svg" alt=""
          /></a>
        </nav>
      </div>
    </footer>
    <script src="script.js"></script>
    <script>
      const pageTitle = new URLSearchParams(window.location.search).get(
        "title",
      );
      const title = document.querySelector("#coming-soon-title");

      if (pageTitle && title) {
        title.textContent = pageTitle;
        document.title = `${pageTitle} | Cyfer Tech`;
      }

      const pageType = new URLSearchParams(window.location.search).get("type");
      const type = document.querySelector("#coming-soon-type");
      if (pageType && type) {
        type.textContent = pageType;
      }
    </script>
  </body>
</html>
