<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Details coming soon | Cyfer Tech</title>
    <meta name="description" content="Details are coming soon on Cyfer Tech." />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="index.html">
          <img src="assets/cyfer-logo.svg" alt="Cyfer Tech home" />
          <span>Cyfer Tech</span>
        </a>
        <button
          class="menu-toggle"
          type="button"
          aria-label="Open navigation"
          aria-expanded="false"
        >
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M4 7h16M4 12h16M4 17h16"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <div class="nav-links">
          <a href="index.html">Portfolio</a>
          <a href="products.html">Products</a>
          <a href="blogs.html">Blogs</a>
          <a href="sponsorship.html">Sponsorship</a>
          <a href="contact.html">Contact</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="coming-soon" aria-labelledby="coming-soon-title">
        <h1 id="coming-soon-title">Details</h1>
        <p>details coming soon..</p>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <span>Cyfer Tech</span>
        <span>Details are coming soon.</span>
      </div>
    </footer>
    <script src="script.js"></script>
    <script>
      const pageTitle = new URLSearchParams(window.location.search).get(
        "title",
      );
      const heading = document.querySelector("#coming-soon-title");

      if (pageTitle && heading) {
        heading.textContent = pageTitle;
        document.title = `${pageTitle} | Cyfer Tech`;
      }
    </script>
  </body>
</html>
